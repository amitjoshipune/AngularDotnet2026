<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-logo mb-3">SB</div>
        <h1 class="h3 mb-1">Forgot password</h1>
        <p class="text-muted mb-0">We will send a reset code to your email</p>
      </div>

      <div class="dev-hint mb-3 text-muted">
        Local dev: check the API console for <code>[DEV OTP] PasswordReset</code>.
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2" role="alert">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="alert alert-success py-2" role="alert">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" novalidate>
        <div class="mb-4">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control form-control-lg"
            [(ngModel)]="email"
            required
            autocomplete="username"
            placeholder="you@example.com"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="isSubmitting || forgotForm.invalid"
        >
          <span *ngIf="!isSubmitting">Send reset code</span>
          <span *ngIf="isSubmitting">Sending...</span>
        </button>
      </form>

      <p class="text-center mt-4 mb-0">
        <a routerLink="/login">Back to sign in</a>
        ·
        <a routerLink="/forgot-login-id">Forgot login email?</a>
      </p>
    </div>
  </div>
</div>
