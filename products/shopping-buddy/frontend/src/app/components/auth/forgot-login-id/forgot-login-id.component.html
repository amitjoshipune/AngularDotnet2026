<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-logo mb-3">SB</div>
        <h1 class="h3 mb-1">Forgot login email</h1>
        <p class="text-muted mb-0">Enter the display name on your account</p>
      </div>

      <div class="dev-hint mb-3 text-muted">
        Local dev: the API console shows your login email under <code>[DEV OTP] ForgotLoginId</code>.
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2" role="alert">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="alert alert-success py-2" role="alert">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #forgotLoginForm="ngForm" novalidate>
        <div class="mb-4">
          <label for="displayName" class="form-label">Display name</label>
          <input
            id="displayName"
            name="displayName"
            type="text"
            class="form-control form-control-lg"
            [(ngModel)]="displayName"
            required
            placeholder="e.g. Sunita Patil"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="isSubmitting || forgotLoginForm.invalid"
        >
          <span *ngIf="!isSubmitting">Send reminder</span>
          <span *ngIf="isSubmitting">Sending...</span>
        </button>
      </form>

      <p class="text-center mt-4 mb-0">
        <a routerLink="/login">Back to sign in</a>
      </p>
    </div>
  </div>
</div>
