<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-logo mb-3">SB</div>
        <h1 class="h3 mb-1">Reset password</h1>
        <p class="text-muted mb-0">Enter the code and your new password</p>
      </div>

      <div class="dev-hint mb-3 text-muted">
        Copy the reset code from the API console (<code>[DEV OTP] PasswordReset</code>).
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2" role="alert">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="alert alert-success py-2" role="alert">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #resetForm="ngForm" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control form-control-lg"
            [(ngModel)]="email"
            required
          />
        </div>

        <div class="mb-3">
          <label for="code" class="form-label">Reset code</label>
          <input
            id="code"
            name="code"
            type="text"
            class="form-control form-control-lg"
            [(ngModel)]="code"
            required
            maxlength="6"
            inputmode="numeric"
          />
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">New password</label>
          <input
            id="newPassword"
            name="newPassword"
            type="password"
            class="form-control form-control-lg"
            [(ngModel)]="newPassword"
            required
            minlength="8"
            autocomplete="new-password"
          />
        </div>

        <div class="mb-4">
          <label for="confirmPassword" class="form-label">Confirm password</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            class="form-control form-control-lg"
            [(ngModel)]="confirmPassword"
            required
            autocomplete="new-password"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="isSubmitting || resetForm.invalid"
        >
          <span *ngIf="!isSubmitting">Update password</span>
          <span *ngIf="isSubmitting">Updating...</span>
        </button>
      </form>

      <p class="text-center mt-4 mb-0">
        <a routerLink="/login">Back to sign in</a>
      </p>
    </div>
  </div>
</div>
