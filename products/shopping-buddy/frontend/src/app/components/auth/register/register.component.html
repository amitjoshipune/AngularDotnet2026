<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-logo mb-3">SB</div>
        <h1 class="h3 mb-1">Create account</h1>
        <p class="text-muted mb-0">Join BookMyShoppingBuddy as a customer</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2" role="alert">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="alert alert-success py-2" role="alert">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate>
        <div class="mb-3">
          <label for="displayName" class="form-label">Display name</label>
          <input
            id="displayName"
            name="displayName"
            type="text"
            class="form-control form-control-lg"
            [(ngModel)]="displayName"
            required
            autocomplete="name"
            placeholder="Your full name"
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control form-control-lg"
            [(ngModel)]="email"
            required
            autocomplete="username"
            placeholder="you@example.com"
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control form-control-lg"
            [(ngModel)]="password"
            required
            minlength="8"
            autocomplete="new-password"
            placeholder="At least 8 characters"
          />
        </div>

        <div class="mb-4">
          <label for="confirmPassword" class="form-label">Confirm password</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            class="form-control form-control-lg"
            [(ngModel)]="confirmPassword"
            required
            autocomplete="new-password"
            placeholder="Repeat password"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="isSubmitting || registerForm.invalid"
        >
          <span *ngIf="!isSubmitting">Create account</span>
          <span *ngIf="isSubmitting">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Creating...
          </span>
        </button>
      </form>

      <p class="text-center mt-4 mb-0">
        Already have an account?
        <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </div>
</div>
